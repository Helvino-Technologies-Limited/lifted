services:
  - type: web
    name: lifted-to-lift-api
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm run db:init && npm start
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_ZdrOh6NQX4Iz@ep-sparkling-frog-an0v6fn2-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://liftedtolift.vercel.app
      - key: PORT
        value: 5000
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
